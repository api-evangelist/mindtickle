apis:
  - aid: mindtickle:mindtickle-rest-api
    name: Mindtickle REST API
    description: Core REST API for managing users, groups, modules, learner details, and reporting within the Mindtickle revenue productivity platform. Supports SCIM-based user provisioning and returns JSON responses.
    humanURL: https://www.mindtickle.com/platform/integrations/
    baseURL: https://api.mindtickle.com
    tags:
      - Users
      - Groups
      - Modules
      - Reporting
      - Analytics
    properties:
      - type: Documentation
        url: https://www.mindtickle.com/platform/integrations/
      - type: Authentication
        url: https://www.mindtickle.com/technical-and-organizational-security-measures/
  - aid: mindtickle:mindtickle-call-ai-graphql-api
    name: Mindtickle Call AI Public API
    description: GraphQL public API providing programmatic access to call recordings, transcriptions, coaching scores, and conversation intelligence data from the Mindtickle Call AI platform. Authenticated via OAuth 2.0.
    humanURL: https://www.mindtickle.com/call-ai-public-api-mindtickle/
    baseURL: https://api-gateway.callai.www.mindtickle.com/public/graphapi
    tags:
      - Call Intelligence
      - Recordings
      - Coaching
      - GraphQL
      - OAuth
    properties:
      - type: Documentation
        url: https://www.mindtickle.com/call-ai-public-api-mindtickle/
